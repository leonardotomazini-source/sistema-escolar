{% extends "base.html" %}

{% block content %}
<h2>Disciplinas</h2>
<form method="POST" class="mb-3">
    <div class="input-group">
        <input type="text" name="nome" class="form-control" placeholder="Nome da disciplina" required>
        <button class="btn btn-outline-primary" type="submit">Adicionar</button>
    </div>
</form>
<ul class="list-group">
    {% for id,name in disciplinas %}
        <li class="list-group-item">{{ name }}</li>
    {% endfor %}
</ul>
{% endblock %}
